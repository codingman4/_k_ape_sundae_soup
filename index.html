* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; height:100vh; overflow:hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width:285px; min-width:285px;
  background:#1a1a2e; color:#eee;
  display:flex; flex-direction:column;
  z-index:1000;
  box-shadow:4px 0 20px rgba(0,0,0,0.5);
  transition:width 0.35s ease, min-width 0.35s ease;
  overflow:hidden;
}
#sidebar.hidden { width:0; min-width:0; }

/* ── GEAR BTN (fixed top-left, only when sidebar hidden) ── */
#gear-btn {
  display:none;
  position:fixed; top:0; left:0; z-index:2000;
  width:40px; height:40px;
  background:#1a1a2e; border:none; cursor:pointer;
  border-radius:0 0 10px 0;
  align-items:center; justify-content:center;
  box-shadow:2px 2px 8px rgba(0,0,0,0.5);
  transition:background 0.2s;
}
#gear-btn:hover { background:#2d2d4e; }
#gear-btn.visible { display:flex; }

/* ── HEADER ── */
#sidebar-header {
  background:linear-gradient(135deg,#e63946,#c1121f);
  flex-shrink:0;
  position:relative;
  padding:16px 16px 14px 16px;
}
.header-text h1 { font-size:14px; font-weight:700; color:white; margin-bottom:2px; white-space:nowrap; }
.header-text p { font-size:10px; color:rgba(255,255,255,0.7); white-space:nowrap; }

/* K← 버튼 — 배너 최우측 최상단, 배경 배너색에 녹아들도록 */
#collapse-btn {
  position:absolute;
  top:0; right:0;
  width:34px; height:34px;
  background:transparent;       /* 배너 그라디언트에 녹아들게 */
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  border-radius:0 0 0 8px;
  transition:background 0.2s;
  padding:0;
}
#collapse-btn:hover {
  background:rgba(0,0,0,0.18); /* 호버 시에만 살짝 어둡게 */
}

#lang-toggle-row {
  display:flex; gap:6px; margin-top:8px;
}
.lang-btn {
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.75);
  font-size:10px; font-weight:600;
  padding:3px 8px; border-radius:5px;
  cursor:pointer; transition:all 0.15s;
}
.lang-btn:hover { background:rgba(255,255,255,0.2); }
.lang-btn.active {
  background:#fff; color:#c1121f; border-color:#fff;
}

/* ── BODY ── */
#sidebar-body { flex:1; overflow-y:auto; padding:12px; }
#sidebar-body::-webkit-scrollbar { width:4px; }
#sidebar-body::-webkit-scrollbar-thumb { background:#444; border-radius:2px; }

.section-title {
  font-size:10px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:#888; margin:12px 0 7px;
}
.section-title:first-child { margin-top:2px; }

#stat-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:5px; margin-bottom:4px;
}
.stat-badge {
  padding:7px 4px; border-radius:8px;
  background:rgba(255,255,255,0.05);
  text-align:center; border:1px solid rgba(255,255,255,0.08);
}
.stat-badge .num { font-size:16px; font-weight:700; color:#ffd166; }
.stat-badge .lbl { font-size:9px; color:#888; margin-top:1px; }

.layer-item {
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:10px; margin-bottom:5px;
  cursor:pointer; border:1px solid transparent;
  transition:all 0.2s; user-select:none; white-space:nowrap;
}
.layer-item:hover { background:rgba(255,255,255,0.05); }
.layer-item.active { border-color:rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); }
.layer-dot {
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
.layer-info { flex:1; overflow:hidden; }
.layer-name { font-size:13px; font-weight:600; color:#eee; }
.layer-count { font-size:11px; color:#888; margin-top:1px; }
.layer-toggle {
  width:36px; height:20px; border-radius:10px;
  background:#333; position:relative; transition:all 0.2s; flex-shrink:0;
}
.layer-toggle.on { background:#4caf50; }
.layer-toggle::after {
  content:''; position:absolute; top:2px; left:2px;
  width:16px; height:16px; border-radius:50%;
  background:white; transition:all 0.2s;
}
.layer-toggle.on::after { left:18px; }

.price-row { display:flex; gap:5px; margin-top:2px; }
.price-btn {
  flex:1; padding:7px 4px; border-radius:8px;
  border:1.5px solid #333; background:transparent;
  color:#888; font-size:11px; font-weight:700;
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.price-btn.active { border-color:#ffd166; background:rgba(255,209,102,0.12); color:#ffd166; }

#search-wrap { position:relative; margin-bottom:4px; }
#search {
  width:100%; padding:9px 34px 9px 12px;
  border-radius:8px; border:1px solid #333;
  background:rgba(255,255,255,0.05); color:#eee;
  font-size:13px; outline:none; transition:border-color 0.2s;
}
#search::placeholder { color:#555; }
#search:focus { border-color:#e63946; }
#search-icon {
  position:absolute; right:10px; top:50%;
  transform:translateY(-50%); color:#555; font-size:14px; pointer-events:none;
}

/* ── FOOTER ── */
#sidebar-footer {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px;
  border-top:1px solid #2a2a3e;
  background:#161625; flex-shrink:0;
}
#profile-link {
  flex-shrink:0; display:block;
  width:42px; height:42px; border-radius:50%;
  overflow:hidden;
  border:2.5px solid #5B5EA6;   /* PMS 276 */
  cursor:pointer; transition:border-color 0.2s, box-shadow 0.2s; text-decoration:none;
  box-shadow: 0 0 6px #5B5EA688;
}
#profile-link:hover {
  border-color:#7B7FBF;
  box-shadow: 0 0 10px #5B5EA6;
}
#profile-link img { width:100%; height:100%; object-fit:cover; }
#footer-right { flex:1; display:flex; flex-direction:column; gap:5px; }
#visible-count { font-size:11px; color:#888; }
#visible-count span { color:#ffd166; font-weight:700; }
#reset-btn {
  padding:6px 10px; border-radius:7px;
  background:transparent; border:1px solid #333;
  color:#888; font-size:11px; cursor:pointer;
  transition:all 0.2s; text-align:center; white-space:nowrap;
}
#reset-btn:hover { border-color:#e63946; color:#e63946; }

/* ── MAP ── */
#map { flex:1; z-index:1; }

/* ── POPUP ── */
.mic-popup { min-width:220px; }
.mic-popup .pop-name { font-size:14px; font-weight:700; margin-bottom:5px; color:#1a1a2e; }
.mic-popup .pop-award {
  display:inline-flex; align-items:center; padding:3px 8px; border-radius:12px;
  font-size:11px; font-weight:700; color:white; margin-bottom:8px;
}
.mic-popup .pop-row { font-size:12px; color:#555; margin-bottom:3px; }
.mic-popup .pop-row b { color:#333; }
.mic-popup .pop-link {
  display:block; margin-top:8px; padding:6px 10px;
  background:#e63946; color:white; border-radius:6px;
  text-decoration:none; text-align:center; font-size:11px; font-weight:600;
}
.mic-popup .pop-link:hover { background:#c1121f; }
.pop-gs { display:inline-block; font-size:10px; background:#2d6a4f; color:white; padding:2px 6px; border-radius:4px; margin-left:5px; }
.leaflet-popup-content-wrapper { border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.2); }
.leaflet-popup-content { margin:14px 16px; }
.mic-marker {
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; border:2.5px solid white; font-weight:800; color:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.35); cursor:pointer;
}

/* Leaflet.markercluster */
.leaflet-cluster-anim .leaflet-marker-icon, .leaflet-cluster-anim .leaflet-marker-shadow {
	-webkit-transition: -webkit-transform 0.3s ease-out, opacity 0.3s ease-in;
	-moz-transition: -moz-transform 0.3s ease-out, opacity 0.3s ease-in;
	-o-transition: -o-transform 0.3s ease-out, opacity 0.3s ease-in;
	transition: transform 0.3s ease-out, opacity 0.3s ease-in;
}

.leaflet-cluster-spider-leg {
	/* stroke-dashoffset (duration and function) should match with leaflet-marker-icon transform in order to track it exactly */
	-webkit-transition: -webkit-stroke-dashoffset 0.3s ease-out, -webkit-stroke-opacity 0.3s ease-in;
	-moz-transition: -moz-stroke-dashoffset 0.3s ease-out, -moz-stroke-opacity 0.3s ease-in;
	-o-transition: -o-stroke-dashoffset 0.3s ease-out, -o-stroke-opacity 0.3s ease-in;
	transition: stroke-dashoffset 0.3s ease-out, stroke-opacity 0.3s ease-in;
}

.marker-cluster-small {
	background-color: rgba(181, 226, 140, 0.6);
	}
.marker-cluster-small div {
	background-color: rgba(110, 204, 57, 0.6);
	}

.marker-cluster-medium {
	background-color: rgba(241, 211, 87, 0.6);
	}
.marker-cluster-medium div {
	background-color: rgba(240, 194, 12, 0.6);
	}

.marker-cluster-large {
	background-color: rgba(253, 156, 115, 0.6);
	}
.marker-cluster-large div {
	background-color: rgba(241, 128, 23, 0.6);
	}

	/* IE 6-8 fallback colors */
.leaflet-oldie .marker-cluster-small {
	background-color: rgb(181, 226, 140);
	}
.leaflet-oldie .marker-cluster-small div {
	background-color: rgb(110, 204, 57);
	}

.leaflet-oldie .marker-cluster-medium {
	background-color: rgb(241, 211, 87);
	}
.leaflet-oldie .marker-cluster-medium div {
	background-color: rgb(240, 194, 12);
	}

.leaflet-oldie .marker-cluster-large {
	background-color: rgb(253, 156, 115);
	}
.leaflet-oldie .marker-cluster-large div {
	background-color: rgb(241, 128, 23);
}

.marker-cluster {
	background-clip: padding-box;
	border-radius: 20px;
	}
.marker-cluster div {
	width: 30px;
	height: 30px;
	margin-left: 5px;
	margin-top: 5px;

	text-align: center;
	border-radius: 15px;
	font: 12px "Helvetica Neue", Arial, Helvetica, sans-serif;
	}
.marker-cluster span {
	line-height: 30px;
	}
</style>
</head>

    layerName: {pi:'피순대', tojong:'토종순대', both:'피순대+토종순대'},
    layerCount: {pi:'617곳', tojong:'592곳', both:'57곳'},
    priceTitle: '가격대 PRICE RANGE',
    resetBtn: '↺ 필터 초기화',
    collapseTitle: '필터 숨기기',
    gearTitle: '필터 열기',
    shownPrefix: '표시 중: ',
    shownSuffix: ' / 1266개',
    sourceLink: '구글 지도에서 보기 →',
  },
  ja: {
    docTitle: '🍲 ピスンデ・トジョンスンデ マップ',
    headerTitle: '🍲 ピスンデ・トジョンスンデ マップ',
    headerSub: '韓国全土 ピスンデ・トジョンスンデ店 · 1266件',
    stat: {pi:'ピスンデ', tojong:'トジョンスンデ', both:'ピスンデ+トジョンスンデ'},
    searchTitle: '🔍 検索',
    searchPlaceholder: '店名・住所で検索...',
    layersTitle: 'レイヤー LAYERS',
    layerName: {pi:'ピスンデ', tojong:'トジョンスンデ', both:'ピスンデ+トジョンスンデ'},
    layerCount: {pi:'617件', tojong:'592件', both:'57件'},
    priceTitle: '価格帯 PRICE RANGE',
    resetBtn: '↺ フィルターをリセット',
    collapseTitle: 'フィルターを隠す',
    gearTitle: 'フィルターを開く',
    shownPrefix: '表示中: ',
    shownSuffix: ' / 1266件',
    sourceLink: 'Googleマップで見る →',
  },
  en: {
    docTitle: '🍲 Pisoondae · Tojong Soondae Map',
    headerTitle: '🍲 Pisoondae · Tojong Soondae Map',
    headerSub: 'Korea-wide · 1266 places',
    stat: {pi:'Pisoondae', tojong:'Tojong', both:'Both'},
    searchTitle: '🔍 Search',
    searchPlaceholder: 'Search name or address...',
    layersTitle: 'LAYERS',
    layerName: {pi:'Pisoondae', tojong:'Tojong Soondae', both:'Both (Pi+Tojong)'},
    layerCount: {pi:'617 places', tojong:'592 places', both:'57 places'},
    priceTitle: 'PRICE RANGE',
    resetBtn: '↺ Reset Filters',
    collapseTitle: 'Hide filters',
    gearTitle: 'Show filters',
    shownPrefix: 'Showing: ',
    shownSuffix: ' / 1266',
    sourceLink: 'View on Google Maps →',
  },
};
let currentLang = 'ko';

function displayName(r){
  if (currentLang === 'ja') return r.nja || r.n;
  if (currentLang === 'en') return r.nen || r.n;
  return r.n;
}

const map=L.map('map',{zoomControl:false}).setView([36.5,127.8],7);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

let layerVisible={}, priceVisible={'\u20a9':true,'\u20a9\u20a9':true,'\u20a9\u20a9\u20a9':true,'\u20a9\u20a9\u20a9\u20a9':true,'NONE':true}, searchTerm='';
Object.keys(CATEGORY_CONFIG).forEach(k=>layerVisible[k]=true);
const layerGroups={};
Object.keys(CATEGORY_CONFIG).forEach(aw=>{layerGroups[aw]=L.markerClusterGroup({maxClusterRadius:50,spiderfyOnMaxZoom:true,showCoverageOnHover:false,disableClusteringAtZoom:14}).addTo(map);});
const allMarkers=[];

function createIcon(aw){
  const c=CATEGORY_CONFIG[aw];
  return L.divIcon({
    html:'<div class="mic-marker" style="background:'+c.color+';width:'+c.size+'px;height:'+c.size+'px;font-size:10px;">'+c.label+'</div>',
    className:'',iconSize:[c.size,c.size],iconAnchor:[c.size/2,c.size/2],popupAnchor:[0,-c.size/2-4]
  });
}
function makePopup(r){
  const c=CATEGORY_CONFIG[r.aw];
  const t=I18N[currentLang];
  const ratingLine = r.rt ? ('\u2605 ' + r.rt + ' (' + (r.rc||0) + ')') : '\u2605 평점 정보 없음';
  const priceLine = r.p ? ('\ud83d\udcb0 ' + r.p + ' (' + (PRICE_LABELS[r.p]||'') + ')') : '\ud83d\udcb0 가격 정보 없음';
  return '<div class="mic-popup">' +
    '<div class="pop-name">' + displayName(r) + '</div>' +
    '<span class="pop-award" style="background:' + c.color + '">' + r.aw + '</span>' +
    '<div class="pop-row">' + ratingLine + '</div>' +
    '<div class="pop-row">' + priceLine + '</div>' +
    '<div class="pop-row">\ud83d\udccd ' + (r.a||'') + '</div>' +
    (r.ph ? '<div class="pop-row">\ud83d\udcde ' + r.ph + '</div>' : '') +
    '<a class="pop-link" href="' + r.url + '" target="_blank">' + t.sourceLink + '</a>' +
    '</div>';
}
function refreshPopups(){
  allMarkers.forEach(m=>{ m.setPopupContent(makePopup(m._mic)); });
}
function setLang(lang){
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
  const t = I18N[lang];
  document.getElementById('doc-title').textContent = t.docTitle;
  document.getElementById('header-title').textContent = t.headerTitle;
  document.getElementById('header-sub').textContent = t.headerSub;
  document.getElementById('lbl-Pi').textContent = t.stat.pi;
  document.getElementById('lbl-Tojong').textContent = t.stat.tojong;
  document.getElementById('lbl-Both').textContent = t.stat.both;
  document.getElementById('search-section-title').textContent = t.searchTitle;
  document.getElementById('search').placeholder = t.searchPlaceholder;
  document.getElementById('layers-section-title').textContent = t.layersTitle;
  document.getElementById('name-Pi').textContent = t.layerName.pi;
  document.getElementById('count-Pi').textContent = t.layerCount.pi;
  document.getElementById('name-Tojong').textContent = t.layerName.tojong;
  document.getElementById('count-Tojong').textContent = t.layerCount.tojong;
  document.getElementById('name-Both').textContent = t.layerName.both;
  document.getElementById('count-Both').textContent = t.layerCount.both;
  document.getElementById('price-section-title').textContent = t.priceTitle;
  document.getElementById('reset-btn').textContent = t.resetBtn;
  document.getElementById('collapse-btn').title = t.collapseTitle;
  document.getElementById('gear-btn').title = t.gearTitle;
  document.getElementById('shown-prefix').textContent = t.shownPrefix;
  document.getElementById('shown-suffix').textContent = t.shownSuffix;
  refreshPopups();
}

RESTAURANTS.forEach(r=>{
  if (!r.lat || !r.lng) return;
  const m=L.marker([r.lat,r.lng],{icon:createIcon(r.aw)});
  m.bindPopup(makePopup(r),{maxWidth:260});
  m._mic=r; allMarkers.push(m);
  layerGroups[r.aw].addLayer(m);
});

function isCategoryOn(aw){
  if (aw === '피순대+토종순대') {
    return layerVisible['피순대'] || layerVisible['토종순대'] || layerVisible['피순대+토종순대'];
  }
  return layerVisible[aw];
}

function updateMarkers(){
  let shown=0;
  allMarkers.forEach(m=>{
    const r=m._mic;
    const priceOk = priceVisible[r.p || 'NONE'];
    const show = isCategoryOn(r.aw) && priceOk &&
      (!searchTerm || r.n.toLowerCase().includes(searchTerm) || (r.a && r.a.toLowerCase().includes(searchTerm)));
    if(show){ if(!layerGroups[r.aw].hasLayer(m)) layerGroups[r.aw].addLayer(m); shown++; }
    else{ layerGroups[r.aw].removeLayer(m); }
  });
  document.getElementById('shown-num').textContent=shown;
}
function toggleLayer(aw){
  layerVisible[aw]=!layerVisible[aw];
  document.getElementById(CATEGORY_CONFIG[aw].tid).classList.toggle('on',layerVisible[aw]);
  updateMarkers();
}
function togglePrice(p){
  priceVisible[p]=!priceVisible[p];
  document.getElementById(PRICE_IDS[p]).classList.toggle('active',priceVisible[p]);
  updateMarkers();
}
function resetFilters(){
  Object.keys(layerVisible).forEach(k=>layerVisible[k]=true);
  Object.keys(priceVisible).forEach(k=>priceVisible[k]=true);
  searchTerm=''; document.getElementById('search').value='';
  Object.values(CATEGORY_CONFIG).forEach(c=>document.getElementById(c.tid).classList.add('on'));
  Object.values(PRICE_IDS).forEach(id=>document.getElementById(id).classList.add('active'));
  updateMarkers();
}
function closeSidebar(){
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('gear-btn').classList.add('visible');
  setTimeout(()=>map.invalidateSize(),360);
}
function openSidebar(){
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('gear-btn').classList.remove('visible');
  setTimeout(()=>map.invalidateSize(),360);
}
document.getElementById('search').addEventListener('input',function(){
  searchTerm=this.value.toLowerCase().trim(); updateMarkers();
});
setLang('ko');
updateMarkers();
</script>
